<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ti</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #fff5f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .corazon {
            position: relative;
            width: 100px;
            height: 90px;
            background-color: #e63946;
            transform: rotate(-45deg);
            margin-bottom: 50px;
            animation: latido 1.2s infinite;
        }

        .corazon::before, .corazon::after {
            content: "";
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: #e63946;
            border-radius: 50%;
        }

        .corazon::before { top: -50px; left: 0; }
        .corazon::after { left: 50px; top: 0; }

        @keyframes latido {
            0% { transform: rotate(-45deg) scale(1); }
            15% { transform: rotate(-45deg) scale(1.1); }
            30% { transform: rotate(-45deg) scale(1); }
            45% { transform: rotate(-45deg) scale(1.15); }
            60% { transform: rotate(-45deg) scale(1); }
        }

        h1 {
            color: #333;
            text-align: center;
            padding: 0 20px;
        }
    </style>
</head>
<body>

    <div class="corazon"></div>
    <h1>"Aquí pones tus palabras especiales"</h1>

</body>
</html>
