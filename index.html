<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex"> <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo para tus ojos</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #fff5f5;
            font-family: sans-serif;
            visibility: hidden; 
        }

        .corazon {
            position: relative;
            width: 100px;
            height: 90px;
            background-color: #e63946;
            transform: rotate(-45deg);
            margin-bottom: 70px;
        }

        .corazon::before, .corazon::after {
            content: "";
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: #e63946;
            border-radius: 50%;
        }

        .corazon::before { top: -50px; left: 0; }
        .corazon::after { left: 50px; top: 0; }

        h1 { color: #333; text-align: center; padding: 0 20px; }
    </style>
</head>
<body>

    <script>
        
        var claveCorrecta = "<11/12/25>"; 
        
        var intento = prompt("Ingresa la contraseña para ver el mensaje:");

        if (intento === claveCorrecta) {
            document.body.style.visibility = "visible";
        } else {
            alert("Contraseña incorrecta.");
            document.body.innerHTML = "<h1>Acceso no autorizado. Actualiza la página e intenta de nuevo.</h1>";
            document.body.style.visibility = "visible";
        }
    </script>

    <div class="corazon"></div>
    <h1>"Feliz tercer mes mi amor Noemí Briggitte Reyes Doche, eres la razon de mi felicidad el motivo de mi vivir espero que podamos seguir estando juntos corazon te amo a ti y solo ti"</h1>

</body>
</html>
