<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ti - Corazón Estático</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #fff5f5; /* Un fondo rosado muy suave */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .corazon {
            position: relative;
            width: 100px;
            height: 90px;
            background-color: #e63946; /* El rojo del corazón */
            transform: rotate(-45deg); /* Esta inclinación forma el corazón */
            margin-bottom: 70px; /* Espacio para el texto abajo */
            /* He eliminado la línea de animación aquí */
        }

        .corazon::before, .corazon::after {
            content: "";
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: #e63946;
            border-radius: 50%; /* Esto hace las partes redondas */
        }

        .corazon::before {
            top: -50px;
            left: 0;
        }

        .corazon::after {
            left: 50px;
            top: 0;
        }

        h1 {
            color: #333;
            text-align: center;
            padding: 0 20px;
            font-size: 2rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="corazon"></div>

    <h1>"Aquí pones tus palabras especiales"</h1>

</body>
</html>
